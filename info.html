<!DOCTYPE html>
<html>
<head>
<title>SXC60S Media Hub</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#0f0f0f;
color:white;
font-family:Arial;
text-align:center;
overflow:hidden;
}

/* BACKGROUND GLOW */
body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:radial-gradient(circle at center, rgba(255,255,255,0.08), transparent 60%);
pointer-events:none;
}

/* MAIN CONTAINER */
.container{
max-width:700px;
padding:40px;
animation:fadeIn 1.2s ease;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

/* TITLE */
h1{
font-size:48px;
letter-spacing:5px;
margin-bottom:10px;
}

/* SUBTEXT */
p{
opacity:0.75;
font-size:16px;
line-height:1.6;
}

/* MAIN ENTER BUTTON */
.button{
display:inline-block;
margin-top:25px;
padding:14px 32px;
background:white;
color:black;
text-decoration:none;
font-weight:bold;
border-radius:12px;
font-size:16px;
transition:0.3s;
}

.button:hover{
transform:scale(1.08);
box-shadow:0 0 30px rgba(255,255,255,0.25);
}

/* SECOND BUTTON */
.secondary{
display:inline-block;
margin-top:12px;
padding:10px 20px;
background:#222;
color:white;
text-decoration:none;
border-radius:10px;
font-size:14px;
transition:0.3s;
}

.secondary:hover{
background:#333;
}

/* SMALL LABEL */
.label{
font-size:12px;
opacity:0.5;
letter-spacing:2px;
margin-bottom:10px;
text-transform:uppercase;
}

</style>

</head>

<body>

<div class="container">

<div class="label">Modern Volvo Culture</div>

<h1>S_XC60S MEDIA</h1>

<p>
Built from a 2016 Volvo S60L and a 2017 Volvo XC60 T6.<br>
Cinematic car photography, drone footage, and edits focused on Volvo culture.
</p>

<!-- MAIN ENTER BUTTON -->
<a class="button" href="index.html">
ENTER SITE
</a>

<br>

<!-- INFO PAGE -->
<a class="secondary" href="info.html">
View Pricing & Info
</a>

</div>

</body>
</html>
