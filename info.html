<!DOCTYPE html>
<html>
<head>
<title>S_XC60S Brand</title>

<style>

body{
margin:0;
background:#111;
color:white;
font-family:Arial;
text-align:center;
padding:60px 20px;
}

/* BRAND BLOCK */
.brand{
max-width:800px;
margin:0 auto;
padding:40px 20px;
}

.brand p.top{
opacity:0.7;
letter-spacing:2px;
text-transform:uppercase;
font-size:14px;
margin-bottom:10px;
}

.brand h1{
font-size:52px;
margin:10px 0;
letter-spacing:5px;
}

.brand p.desc{
font-size:18px;
opacity:0.9;
line-height:1.6;
margin-top:20px;
}

/* BUTTON (optional clean enter style) */
.button{
display:inline-block;
margin-top:30px;
padding:18px 40px;
background:white;
color:black;
text-decoration:none;
font-weight:bold;
border-radius:12px;
font-size:18px;
transition:0.3s;
}

.button:hover{
transform:scale(1.08);
opacity:0.85;
}

</style>

</head>

<body>

<div class="brand">

  <p class="top">
    Modern Volvo culture • cinematic automotive media
  </p>

  <h1>
    S_XC60S
  </h1>

  <p class="desc">
    A visual project built from a 2016 Volvo S60L and a 2017 Volvo XC60 T6,<br>
    designed to prove that Volvo builds can be aggressive, cinematic,<br>
    luxurious, and truly unique.
  </p>

  <a class="button" href="index.html">
    ENTER SITE
  </a>

</div>

</body>
</html>
