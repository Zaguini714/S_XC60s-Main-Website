<!DOCTYPE html>
<html>
<head>
<title>SXC60S Media</title>

<style>

/* BASE */
body{
margin:0;
background:#0f0f0f;
color:white;
font-family:Arial;
}

/* HERO SECTION (FIXED TOP AREA) */
.hero{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
padding:40px;
position:relative;
}

/* TEXT WRAPPER */
.hero-text{
display:flex;
flex-direction:column;
align-items:center;
gap:10px;
animation:fadeIn 1.5s ease;
}

/* SUB TEXT */
.sub{
font-size:14px;
letter-spacing:3px;
opacity:0.6;
text-transform:uppercase;
margin:0;
}

/* MAIN TITLE */
.title{
font-size:72px;
letter-spacing:6px;
margin:0;
}

/* ANIMATION */
@keyframes fadeIn{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

/* BUTTON */
.button{
display:inline-block;
margin-top:20px;
padding:14px 32px;
background:white;
color:black;
text-decoration:none;
font-weight:bold;
border-radius:12px;
transition:0.3s;
}

.button:hover{
transform:scale(1.08);
}

/* MOBILE */
@media (max-width:600px){
.title{
font-size:40px;
}
}

</style>

</head>

<body>

<!-- HERO -->
<header class="hero">

  <div class="hero-text">

    <p class="sub">
      Modern Volvo culture / cinematic media
    </p>

    <h1 class="title">
      SXC60S
    </h1>

    <a class="button" href="info.html">
      Enter Site
    </a>

  </div>

</header>

</body>
</html>
