<!DOCTYPE html>
<html>
<head>

<title>SXC60S Media</title>

<style>

/* =========================
   LOADING SCREEN
========================= */

#loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100vh;
background:#0f0f0f;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
flex-direction:column;
}

#loadText{
font-size:40px;
letter-spacing:4px;
text-transform:uppercase;
animation:glitch 1.2s infinite;
}

@keyframes glitch{
0%{transform:translate(0);}
20%{transform:translate(-2px,2px);}
40%{transform:translate(2px,-2px);}
60%{transform:translate(-1px,1px);}
80%{transform:translate(1px,-1px);}
100%{transform:translate(0);}
}

/* =========================
   BASE
========================= */

body{
margin:0;
background:#0f0f0f;
color:white;
font-family:Arial;

scroll-snap-type:y mandatory;
overflow-y:scroll;
height:100vh;
}

/* glow background */
body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:radial-gradient(circle at 50% 20%, rgba(255,255,255,0.08), transparent 60%);
pointer-events:none;
}

/* =========================
   SECTIONS
========================= */

.section{
height:100vh;
scroll-snap-align:start;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

opacity:0;
transform:translateY(40px);
transition:all 0.8s ease;
}

.section.show{
opacity:1;
transform:translateY(0);
}

/* =========================
   TEXT
========================= */

h1{
font-size:90px;
margin:10px 0;
letter-spacing:2px;
}

p{
font-size:18px;
opacity:0.8;
}

/* scramble title */
#title{
font-size:90px;
margin:10px 0;
letter-spacing:2px;
}

/* =========================
   BUTTONS (MAGNETIC)
========================= */

.button{
display:inline-block;
padding:16px 35px;
background:white;
color:black;
border-radius:12px;
text-decoration:none;
font-weight:bold;
font-size:18px;
margin:10px;
transition:.3s;
}

.button:hover{
transform:scale(1.05);
opacity:0.85;
}

/* =========================
   GALLERY + 3D TILT
========================= */

.gallery{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
}

.gallery img{
width:260px;
border-radius:12px;
filter:grayscale(100%);
transition:transform 0.2s ease, filter 0.3s ease;
transform-style:preserve-3d;
will-change:transform;
}

.gallery img:hover{
filter:grayscale(0%);
}

/* =========================
   STATS
========================= */

.stats{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:15px;
}

.stat-box{
background:#111;
border:1px solid #333;
padding:20px;
border-radius:12px;
width:180px;
transition:.3s;
}

.stat-box:hover{
transform:translateY(-5px);
border-color:white;
}

.stat-box h2{
font-size:40px;
margin:0;
}

.stat-box p{
font-size:14px;
opacity:0.7;
}

</style>

</head>

<body>

<!-- LOADING SCREEN -->
<div id="loader">
<h1 id="loadText">SXC60S MEDIA STARTING</h1>
</div>

<!-- HERO -->
<div class="section">

<h1 id="title">SXC60S MEDIA</h1>

<p>CAR PHOTOGRAPHY • DRONE • CINEMATIC EDITS</p>

<div>
<a class="button" href="info.html">INFO / PRICING</a>
<a class="button" href="index.html">BACK HOME</a>
</div>

</div>

<!-- GALLERY -->
<div class="section">

<h1>GALLERY</h1>

<div class="gallery">

<img src="images/s60.jpg">
<img src="images/xc60.jpg">
<img src="images/drone.jpg">

</div>

</div>

<!-- STATS -->
<div class="section">

<h1>RESULTS</h1>

<div class="stats">

<div class="stat-box">
<h2 class="counter" data-target="150">0</h2>
<p>PHOTOS</p>
</div>

<div class="stat-box">
<h2 class="counter" data-target="25">0</h2>
<p>EDITS</p>
</div>

<div class="stat-box">
<h2 class="counter" data-target="10">0</h2>
<p>SHOOTS</p>
</div>

</div>

</div>

<script>

/* COUNTERS */
const counters=document.querySelectorAll('.counter');

counters.forEach(counter=>{

counter.innerText='0';

const update=()=>{

const target=+counter.getAttribute('data-target');
const c=+counter.innerText;
const inc=target/80;

if(c<target){
counter.innerText=Math.ceil(c+inc);
setTimeout(update,20);
}else{
counter.innerText=target+"+";
}

};

update();

});

/* SCRAMBLE TITLE */
const title=document.getElementById("title");
const finalText="SXC60S MEDIA";
const chars="ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";

let frame=0;

function scramble(){

let out="";

for(let i=0;i<finalText.length;i++){

if(i<frame){
out+=finalText[i];
}else{
out+=chars[Math.floor(Math.random()*chars.length)];
}

}

title.innerText=out;

if(frame<=finalText.length){
frame++;
setTimeout(scramble,70);
}else{
title.innerText=finalText;
}

}

scramble();

/* SCROLL ANIMATION */
const sections=document.querySelectorAll('.section');

const observer=new IntersectionObserver((entries)=>{

entries.forEach(entry=>{

if(entry.isIntersecting){
entry.target.classList.add('show');
}

});

},{threshold:0.5});

sections.forEach(s=>{
observer.observe(s);
});

/* 3D TILT */
const images=document.querySelectorAll(".gallery img");

images.forEach(img=>{

img.addEventListener("mousemove",(e)=>{

const rect=img.getBoundingClientRect();

const x=(e.clientX-rect.left)/rect.width;
const y=(e.clientY-rect.top)/rect.height;

const rotateX=(y-0.5)*-12;
const rotateY=(x-0.5)*12;

img.style.transform=
`perspective(900px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.06)`;

});

img.addEventListener("mouseleave",()=>{

img.style.transform="perspective(900px) rotateX(0deg) rotateY(0deg) scale(1)";

});

});

/* MAGNETIC BUTTONS */
const buttons=document.querySelectorAll(".button");

buttons.forEach(btn=>{

btn.addEventListener("mousemove",(e)=>{

const rect=btn.getBoundingClientRect();

const x=e.clientX-rect.left;
const y=e.clientY-rect.top;

const moveX=(x-rect.width/2)/10;
const moveY=(y-rect.height/2)/10;

btn.style.transform=`translate(${moveX}px,${moveY}px) scale(1.05)`;

});

btn.addEventListener("mouseleave",()=>{

btn.style.transform="translate(0,0) scale(1)";

});

});

/* LOADING SCREEN */
window.addEventListener("load",()=>{

setTimeout(()=>{

document.getElementById("loader").style.opacity="0";
document.getElementById("loader").style.transition="1s ease";

setTimeout(()=>{

document.getElementById("loader").style.display="none";

},1000);

},2000);

});

</script>

</body>
</html>
