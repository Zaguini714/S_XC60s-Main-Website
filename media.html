<!DOCTYPE html>
<html>
<head>

<title>SXC60S Media</title>

<style>

/* BASE */
body{
margin:0;
background:#0f0f0f;
color:white;
font-family:Arial;
text-align:center;
}

/* HERO (MORE TOP-FOCUSED) */
header{
padding:60px 20px 40px 20px;
background:#0f0f0f;
display:flex;
flex-direction:column;
align-items:center;
}

/* TITLE */
h1{
font-size:90px;
margin:10px 0;
letter-spacing:2px;
}

/* SUBTEXT */
p{
font-size:18px;
opacity:0.8;
margin-top:5px;
}

/* BUTTONS */
.button{
display:inline-block;
padding:16px 35px;
background:white;
color:black;
border-radius:12px;
text-decoration:none;
font-weight:bold;
font-size:18px;
margin:10px;
transition:.3s;
}

.button:hover{
transform:scale(1.05);
opacity:0.85;
}

/* GALLERY (closer to top, tighter spacing) */
.gallery{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:15px;
padding:20px 20px 40px 20px;
}

.gallery img{
width:260px;
border-radius:12px;
filter:grayscale(100%);
transition:.3s;
}

.gallery img:hover{
transform:translateY(-6px) scale(1.03);
filter:grayscale(0%);
}

/* STATS */
.stats{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:15px;
padding:20px;
}

.stat-box{
background:#111;
border:1px solid #333;
padding:20px;
border-radius:12px;
width:180px;
transition:.3s;
}

.stat-box:hover{
transform:translateY(-5px);
border-color:white;
}

.stat-box h2{
font-size:40px;
margin:0;
}

.stat-box p{
font-size:14px;
opacity:0.7;
}

/* SCRAMBLE TITLE */
#title{
font-size:90px;
margin:10px 0;
letter-spacing:2px;
}

</style>

</head>

<body>

<header>

<h1 id="title">SXC60S MEDIA</h1>

<p>
CAR PHOTOGRAPHY • DRONE • CINEMATIC EDITS
</p>

<div>
<a class="button" href="info.html">INFO / PRICING</a>
<a class="button" href="index.html">BACK HOME</a>
</div>

</header>

<div class="gallery">

<img src="images/s60.jpg">
<img src="images/xc60.jpg">
<img src="images/drone.jpg">

</div>


<div class="stats">

<div class="stat-box">
<h2 class="counter" data-target="150">0</h2>
<p>PHOTOS</p>
</div>

<div class="stat-box">
<h2 class="counter" data-target="25">0</h2>
<p>EDITS</p>
</div>

<div class="stat-box">
<h2 class="counter" data-target="10">0</h2>
<p>SHOOTS</p>
</div>

</div>


<script>

/* COUNTERS */
const counters=document.querySelectorAll('.counter');

counters.forEach(counter=>{

counter.innerText='0';

const update=()=>{

const target=+counter.getAttribute('data-target');
const c=+counter.innerText;
const inc=target/80;

if(c<target){
counter.innerText=Math.ceil(c+inc);
setTimeout(update,20);
}else{
counter.innerText=target+"+";
}

};

update();

});

/* SCRAMBLE TEXT */
const title=document.getElementById("title");
const finalText="SXC60S MEDIA";
const chars="ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";

let frame=0;

function scramble(){

let out="";

for(let i=0;i<finalText.length;i++){

if(i<frame){
out+=finalText[i];
}else{
out+=chars[Math.floor(Math.random()*chars.length)];
}

}

title.innerText=out;

if(frame<=finalText.length){
frame++;
setTimeout(scramble,70);
}else{
title.innerText=finalText;
}

}

scramble();

</script>

</body>
</html>
