<!DOCTYPE html>
<html>
<head>

<title>SXC60S Media</title>

<style>

body{
background:#111;
color:white;
font-family:Arial;
margin:0;
text-align:center;
animation:fadeIn 1.5s;
}

/* PAGE FADE IN */

@keyframes fadeIn{

from{
opacity:0;
}

to{
opacity:1;
}

}

/* HERO SECTION */

header{

height:100vh;

background-image:url("images/hero.jpg");
background-position:center;
background-size:100%;

display:flex;
justify-content:center;
align-items:center;
flex-direction:column;

animation:zoomHero 8s ease-in-out infinite alternate;

}

@keyframes zoomHero{

from{
background-size:100%;
}

to{
background-size:110%;
}

}

/* TITLE */

h1{

font-size:120px;
margin:0;

text-shadow:
0 0 10px white,
0 0 20px white;

}

/* SUBTITLE */

p{

font-size:25px;

}

/* BUTTONS */

.button{

display:inline-block;

padding:20px 45px;

background:white;
color:black;

border-radius:15px;

text-decoration:none;

font-weight:bold;
font-size:22px;

margin:15px;

transition:.3s;

}

.button:hover{

transform:scale(1.08);

box-shadow:0 0 25px white;

}

/* GALLERY */

.gallery{

display:flex;
flex-wrap:wrap;
justify-content:center;
gap:25px;

padding:60px;

}

.gallery img{

width:320px;
border-radius:15px;

transition:.4s;

box-shadow:0 0 20px rgba(255,255,255,.15);

}

.gallery img:hover{

transform:
translateY(-10px)
scale(1.05);

box-shadow:0 0 30px rgba(255,255,255,.4);

}

/* STATS */

.stats{

display:flex;
justify-content:center;
flex-wrap:wrap;
gap:25px;
padding:50px;

}

.stat-box{

background:#222;
padding:30px;
border-radius:15px;
width:220px;

box-shadow:0 0 20px rgba(255,255,255,.15);

transition:.3s;

}

.stat-box:hover{

transform:translateY(-8px);

}

.stat-box h2{

font-size:50px;
margin:0;

text-shadow:
0 0 10px white;

}

.stat-box p{

font-size:20px;

}

</style>

</head>

<body>

<header>

<h1>SXC60S MEDIA</h1>

<p>
Car Photography • Drone Shots • Cinematic Edits
</p>

<a class="button" href="info.html">
📋 Info / Pricing
</a>

<a class="button" href="index.html">
🏠 Back Home
</a>

</header>

<div class="gallery">

<img src="images/s60.jpg">

<img src="images/xc60.jpg">

<img src="images/drone.jpg">

</div>


<div class="stats">

<div class="stat-box">

<h2 class="counter" data-target="150">0</h2>

<p>Photos Taken</p>

</div>

<div class="stat-box">

<h2 class="counter" data-target="25">0</h2>

<p>Edits Created</p>

</div>

<div class="stat-box">

<h2 class="counter" data-target="10">0</h2>

<p>Shoots</p>

</div>

</div>


<script>

const counters=document.querySelectorAll('.counter');

counters.forEach(counter=>{

counter.innerText='0';

const updateCounter=()=>{

const target=+counter.getAttribute('data-target');

const c=+counter.innerText;

const increment=target/80;

if(c<target){

counter.innerText=`${Math.ceil(c+increment)}`;

setTimeout(updateCounter,20);

}

else{

counter.innerText=target+"+";

}

};

updateCounter();

});

</script>

</body>
</html>
